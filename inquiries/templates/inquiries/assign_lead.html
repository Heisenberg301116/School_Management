{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Lead</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        select:focus, button:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-secondary:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h2>Assign Lead to Agent</h2>

    <div class="form-container">
        <form method="post">
            {% csrf_token %}

            <!-- Select Lead Dropdown -->
            <div class="form-group">
                <label for="inquiry">Select Lead:</label>
                <select name="inquiry_id" id="inquiry" required>
                    <option value="" disabled selected>-- Select Lead --</option>
                    {% for inquiry in inquiries %}
                        <option value="{{ inquiry.id }}">
                            {{ inquiry.student_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Select Agent Dropdown -->
            <div class="form-group">
                <label for="agent">Assign to Agent:</label>
                <select name="agent_id" id="agent" required>
                    <option value="" disabled selected>-- Select Agent --</option>
                    {% for agent in agents %}
                        <option value="{{ agent.id }}">{{ agent.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit">Assign</button>
        </form>

        <!-- Back Link -->
        <a href="{% url 'inquiry_list' %}" class="btn-secondary">Back to Inquiry List</a>
    </div>
</body>

</html>
